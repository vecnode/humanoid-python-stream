# Conda environment for mixed-motion (CLoSD + physics sim)
#
# Python 3.8 — required by IsaacGym (ships pre-compiled .so only for 3.6/3.7/3.8).
#
# Create / recreate:
#   conda env create -f environment.yml
#   conda activate closd
#
# After activation, install packages that need special steps:
#   1. IsaacGym — download the .tar.gz from https://developer.nvidia.com/isaac-gym
#      extract it, then install:
#        pip install isaacgym/python/
#   2. pytorch3d — build from source for your CUDA version:
#        pip install "git+https://github.com/facebookresearch/pytorch3d.git@v0.7.8"
#   3. CLIP:
#        pip install git+https://github.com/openai/CLIP.git

name: closd
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.8
  - pip
  - setuptools
  - wheel

  # X11 / display (needed by isaacgym viewer)
  - libxcb
  - xorg-libx11
  - xorg-libxau
  - xorg-libxdmcp
  - xorg-xorgproto

  - pip:
    # ── Core ML / PyTorch ───────────────────────────────────────────────────
    - torch==2.2.2
    - torchvision==0.17.2
    - triton==2.2.0
    - pytorch-lightning==2.3.3
    - torchmetrics==1.5.2
    - torchgeometry==0.1.2

    # CUDA 12.1 runtime wheels (already pulled by torch; listed for clarity)
